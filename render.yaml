services:
  - type: web
    name: djaga
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: AGENT_MODE
        value: mock
      - key: SESSION_SECRET
        generateValue: true
      # Set this in Render Dashboard → Environment. Never commit the connection string.
      - key: SUPABASE_DB_URL
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: EL_VOICE_ID
        sync: false
      - key: SERVING_ENDPOINT
        sync: false
      - key: CHAT_ENDPOINT
        sync: false

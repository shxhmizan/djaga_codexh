services:
  - type: web
    name: djaga
    runtime: python
    plan: free
    healthCheckPath: /healthz
    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AGENT_MODE
        value: mock
      - key: SESSION_SECRET
        generateValue: true
      # Set this in Render Dashboard → Environment. Never commit the connection string.
      - key: SUPABASE_DB_URL
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_KB_DOCUMENT_ID
        sync: false
      - key: EL_VOICE_ID
        sync: false
      - key: SERVING_ENDPOINT
        sync: false
      - key: CHAT_ENDPOINT
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
